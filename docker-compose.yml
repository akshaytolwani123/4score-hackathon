services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tsec_alumni
      POSTGRES_USER: tsec
      POSTGRES_PASSWORD: tsec
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsec -d tsec_alumni"]
      interval: 3s
      timeout: 3s
      retries: 10
  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://tsec:tsec@db:5432/tsec_alumni
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
  web:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [api]
volumes:
  postgres_data:
